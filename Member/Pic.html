<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to Crop Image Before Upload using Jcrop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="http://unpkg.com/jcrop/dist/jcrop.css">
    <script src="https://unpkg.com/jcrop"></script>
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    background-color: #f3f4f6;
}

#btnCrop, #output, #croppedImg, #btnRefresh {
    display: none;
    margin: auto;
}

#inputImage, .jcrop-stage {
    margin: auto;
}

input[type="file"]::file-selector-button {
    border-radius: 4px;
    padding: 0 16px;
    height: 40px;
    cursor: pointer;
    background-color: white;
    border: 1px solid rbga(0, 0, 0, 0.16);
    box-shadow: 0px 1px 0px rgba(0, 0, 0, 0.05);
    margin-right: 16px;
    transition: background-color 200ms;
}

input[type="file"]::file-selector-button:hover {
    background-color: #f3f4f6;
}

input[type="file"]::file-selector-button:active {
    background-color: #e5e7eb;
}

button {
    background-color: #2ecc71;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
    display: inline-block;
}

button:hover {
    background-color: #27ae60;
}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-jcrop/0.9.15/css/jquery.Jcrop.min.css"></script>
</head>
<body>
    <h1>Crop Image using JCROP</h1>
    <input type="file" id="inputImage">
    <br>
    <img id="output" alt="Select an Image" src="">
    <img id="croppedImg" alt="Cropped Image" src="">
    <br>
    <button id="btnCrop">Crop</button>
    <button id="btnRefresh">Crop Another Image</button>
    <script src="script.js"></script>
</body>
</html>
